<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Reference System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .hero {
            max-width: 600px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        p {
            color: #cbd5f5;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

<div class="hero">
    <h1>IT Reference System</h1>
    <p>نظام إدارة مشاكل تقنية المعلومات وحلولها بشكل منظم وسهل</p>
    <button class="btn" onclick="goLogin()">تسجيل الدخول</button>
</div>

<script>
function goLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
