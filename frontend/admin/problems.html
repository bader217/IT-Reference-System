<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ادارة الحلول - IT Reference System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-main">IT Reference System</div>
            <div class="logo-sub">إدارة الحلول</div>
        </div>
        <nav id="navMenu"></nav>
    </header>

<main class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">اضافة مشكلة وحل</h5>
                <form id="addProblemForm">
                    <div class="mb-3">
                        <select class="form-select" id="problemSection" required>
                            <option value="">اختر القسم</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="problemTitle" placeholder="عنوان المشكلة" required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" id="problemText" rows="3" placeholder="وصف المشكلة" required></textarea>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" id="solutionText" rows="3" placeholder="الحل" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">اضافة</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">المشاكل والحلول</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>القسم</th>
                                <th>العنوان</th>
                                <th>تعديل</th>
                                <th>حذف</th>
                            </tr>
                        </thead>
                        <tbody id="problemsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/css/js/config.js"></script>
    <script src="../assets/css/js/api.js"></script>
    <script src="../assets/css/js/auth.js"></script>
    <script src="../assets/css/js/app.js"></script>
</body>
</html>
