<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ادارة المستخدمين - IT Reference System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-main">IT Reference System</div>
            <div class="logo-sub">إدارة المستخدمين</div>
        </div>
        <nav id="navMenu"></nav>
    </header>

<main class="container py-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title">اضافة مستخدم جديد</h5>
                <form id="addUserForm">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <input type="text" class="form-control" id="newUsername" placeholder="اسم المستخدم" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <input type="password" class="form-control" id="newPassword" placeholder="كلمة المرور" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <input type="text" class="form-control" id="newPhone" placeholder="رقم الجوال" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <select class="form-select" id="newRole">
                                <option value="intern">متدرب</option>
                                <option value="employee">موظف</option>
                                <option value="manager">مدير</option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-3">
                            <button type="submit" class="btn btn-primary w-100">اضافة</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">المستخدمين</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>اسم المستخدم</th>
                                <th>الدور</th>
                                <th>رقم الجوال</th>
                                <th>تاريخ التسجيل</th>
                                <th>حذف</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/css/js/config.js"></script>
    <script src="../assets/css/js/api.js"></script>
    <script src="../assets/css/js/auth.js"></script>
    <script src="../assets/css/js/app.js"></script>
</body>
</html>
