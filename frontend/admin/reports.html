<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البلاغات - IT Reference System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-main">IT Reference System</div>
            <div class="logo-sub">بلاغات المستخدمين</div>
        </div>
        <nav id="navMenu"></nav>
    </header>

<main class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">بلاغات المستخدمين</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>المستخدم</th>
                                <th>القسم</th>
                                <th>العنوان</th>
                                <th>الوصف</th>
                                <th>الحالة</th>
                                <th>تغيير الحالة</th>
                                <th>التاريخ</th>
                                <th>آخر تحديث</th>
                                <th>حذف</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/css/js/config.js"></script>
    <script src="../assets/css/js/api.js"></script>
    <script src="../assets/css/js/auth.js"></script>

</html>
